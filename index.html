    .ds-off .ds-body {stroke: #22c55e; }

    .cb-off .cb {fill:#22c55e; stroke: #ffffff; }

    <h2>2공장 계통</h2>
    <button class="btn" data-view="home" onclick="showView('home')">▶ 2공장 전체(VDU 154KV S/S)</button>
    <button class="btn" data-view="154" onclick="showView('154')">VDU 154KV</button>
    <button class="btn" data-view="PE154" onclick="showView('PE154')">PE 154KV</button>

    <button class="btn" data-view="700공정" onclick="showView('700공정')">PE/MFC생산팀(PE 154KV S/S)</button>

  </div>

<div id="content">
<div id="svg-area"></div>
<div id="popup-right" style="display:none">
<div id="popup-right-header">
<span id="popup-right-title"></span>
<button class="popup-right-close" onclick="closePopupRight()">✕</button>
</div>
<div id="popup-right-content"></div>
</div>
<div id="popup-left" style="display:none">
<div id="popup-left-header">
<span id="popup-left-title"></span>
<button class="popup-left-close" onclick="closePopupLeft()">✕</button>
</div>
<div id="popup-left-content"></div>
</div>
</div>

<script>
let activeTransformer = null;
let currentPage = 0;
let currentSteps = [];

  function showCoord(evt) {
  const svg = evt.target.closest("svg");
  if (!svg) return;
  const pt = svg.createSVGPoint();
  pt.x = evt.clientX;
  pt.y = evt.clientY;
  const cursor = pt.matrixTransform(svg.getScreenCTM().inverse());
  const coord = document.getElementById("coords");
  if (coord) {
    coord.textContent = `x=${cursor.x.toFixed(0)}  y=${cursor.y.toFixed(0)}`;
  }
}

function showView(type) {
  const c = document.getElementById('svg-area');
  if (type === 'home') c.innerHTML = shome();
  if (type === '154') c.innerHTML = s154();
  if (type === 'PE154') c.innerHTML = PE154();
  if (type === '700공정') c.innerHTML = s700공정();
  if (type === '600공정') c.innerHTML = s600공정();
  if (type === '500공정') c.innerHTML = s500공정();
  setActiveMenu(type);
}

function setActiveMenu(view) {
  document.querySelectorAll('#nav .btn').forEach(btn => {
    btn.classList.remove('active');
  });
  const activeBtn = document.querySelector(`#nav .btn[data-view="${view}"]`);
  if (activeBtn) activeBtn.classList.add('active');
  }

function openProcedure(id){
  const data = procedures[id];
  if(!data) return;
  const side = data.popup || "right";

  document.getElementById("popup-right").style.display="none";
  document.getElementById("popup-left").style.display="none";

  const popup = document.getElementById(`popup-${side}`);
  const title = document.getElementById(`popup-${side}-title`);
  const content = document.getElementById(`popup-${side}-content`);

  popup.style.display="block";
  title.innerText = data.title;

  // 👉 정전 / 복전 분리
  const outage = [];
  const restore = [];
  let mode = "outage";

  data.steps.forEach(s=>{
    if(s.text.includes("복전")) mode = "restore";

    if(mode === "outage") outage.push(s);
    else restore.push(s);
  });

  // 👉 페이지 구성 (2페이지 고정)
  currentSteps = [outage, restore];
  currentPage = 0;

  renderPage(content);
}

function renderPage(content){
  const page = currentSteps[currentPage];

  const html = page.map(s=>{
    if(!s.text) return "<br>";
    return `<div style="color:${s.color || '#ffffff'}">${highlightText(s.text)}</div>`;
  }).join("");

  content.innerHTML = `
    <div style="padding-bottom:80px;">
      ${html}
    </div>

    <!-- 👇 하단 고정 영역 -->
    <div style="
      position:absolute;
      bottom:20px;
      left:20px;
      right:20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:#020617;
      padding:10px;
      border-radius:8px;
      border:1px solid #334155;
    ">
      <button onclick="prevPage()">← 정전</button>
      <button onclick="nextPage()">복전 →</button>
    </div>
  `;
}

function nextPage(){
  if(currentPage < currentSteps.length - 1){
    currentPage++;
    updatePage();
  }
}

document.addEventListener("keydown", function(e){
  // 팝업 열려 있을 때만 동작
  const rightOpen = document.getElementById("popup-right").style.display === "block";
  const leftOpen = document.getElementById("popup-left").style.display === "block";

  if(!rightOpen && !leftOpen) return;

  if(e.key === "ArrowRight"){
    nextPage();
  }
  if(e.key === "ArrowLeft"){
    prevPage();
  }
});

function prevPage(){
  if(currentPage > 0){
    currentPage--;
    updatePage();
  }
}

function updatePage(){
  const right = document.getElementById("popup-right-content");
  const left = document.getElementById("popup-left-content");

  if(right.innerHTML !== ""){
    renderPage(right);
  } else {
    renderPage(left);
  }
  if(activeTransformer){
    showStepByPage(activeTransformer);
  }
}

function closePopupRight() {
  document.getElementById("popup-right").style.display = "none";
  document.getElementById("popup-right-content").innerHTML = "";
  document.querySelectorAll(".step-box").forEach(el => el.style.display="none");
  document.querySelectorAll(".step-text").forEach(el => el.style.display="none");
  if(activeTransformer){
    hideNumber(activeTransformer);
    activeTransformer = null;
  }
}

function closePopupLeft(){
  document.getElementById("popup-left").style.display = "none";
  document.getElementById("popup-left-content").innerHTML = "";
  document.querySelectorAll(".step-box").forEach(el => el.style.display="none");
  document.querySelectorAll(".step-text").forEach(el => el.style.display="none");
  if(activeTransformer){
    hideNumber(activeTransformer);
    activeTransformer = null;
  }
}

function animateTransformer(id){
  const tr = document.getElementById(id);
  tr.classList.add("tr-clicked");
  setTimeout(()=>{tr.classList.remove("tr-clicked");},400);
}

function showNumber(id){
  const num = document.getElementById("num-"+id);
  if(num){
    num.classList.add("show");
  }
}
function hideNumber(id){
  const num = document.getElementById("num-"+id);
  if(num){
    num.classList.remove("show");
  }
}
function hideAllNumbers(){
  document.querySelectorAll(".step-number").forEach(el=>{
    el.classList.remove("show");
  });
}
function hideAllSteps(){
  document.querySelectorAll(".step-box").forEach(el=> el.style.display="none");
  document.querySelectorAll(".step-text").forEach(el=> el.style.display="none");
}
function transformerClick(id){
  const isSame = activeTransformer === id;
  hideAllNumbers();
  hideAllSteps();
  closePopupRight();
  closePopupLeft();
  if(isSame){activeTransformer = null;return;}
  animateTransformer(id);
  showNumber(id);
  openProcedure(id);
  showStepByPage(id);
  activeTransformer = id;
}

function highlightText(text){
  return text
    .replace(/"CLOSE"/g, '<span style="color:red; font-weight:bold">"CLOSE"</span>')
    .replace(/"OPEN"/g, '<span style="color:blue; font-weight:bold">"OPEN"</span>')
    .replace(/"확인"/g, '<span style="color:yellow; font-weight:bold">"확인"</span>');
}

function showStepByPage(trId){
  const range = stepRanges[trId];
  if(!range) return;
  const [start, end] = currentPage === 0 ? range.outage : range.restore;
  for(let i=1; i<=120; i++){
    const box = document.getElementById(`step-${trId}-box-${i}`);
    const text = document.getElementById(`step-${trId}-text-${i}`);
    if(!box || !text) continue;
    if(i >= start && i <= end){
      box.style.display = "block";
      text.style.display = "block";
    } else {
      box.style.display = "none";
      text.style.display = "none";
    }
  }
}
